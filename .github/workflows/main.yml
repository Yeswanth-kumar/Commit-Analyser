name: AI Commit Analysis

on:
  push:
    branches: [ main ]

jobs:
  analyze:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build project
        run: ./gradlew clean build -x test

      - name: Run analyzer
        run: java -jar build/libs/commit-analyser.jar HEAD~1 HEAD

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: impact-report
          path: |
            impact-report.json
            impact-comment.md
