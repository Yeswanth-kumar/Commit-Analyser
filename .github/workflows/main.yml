name: AI Commit Analysis

on:
  push:
    branches:
      - main

jobs:
  analyze:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build project
        run: ./gradlew shadowJar

      - name: Show build artifacts (debug)
        run: ls build/libs

      - name: Run analyzer
        run: java -jar build/libs/commit-analyser.jar HEAD~1 HEAD

      - name: Upload impact artifacts
        uses: actions/upload-artifact@v4
        with:
          name: impact-analysis
          path: |
            impact-report.json
            impact-comment.md